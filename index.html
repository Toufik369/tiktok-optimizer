<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Algorithm Hacker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222;
    --pink: #ff2d55;
    --cyan: #00f2ea;
    --white: #f0f0f0;
    --muted: #555;
    --card-glow-pink: 0 0 30px rgba(255,45,85,0.15);
    --card-glow-cyan: 0 0 30px rgba(0,242,234,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(255,45,85,0.07) 0%, rgba(0,242,234,0.05) 50%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 30px 0 24px;
  }

  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--pink), var(--cyan));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 20px rgba(255,45,85,0.4), 0 0 40px rgba(0,242,234,0.2);
    animation: pulse-logo 3s ease-in-out infinite;
  }

  @keyframes pulse-logo {
    0%, 100% { box-shadow: 0 0 20px rgba(255,45,85,0.4), 0 0 40px rgba(0,242,234,0.2); }
    50% { box-shadow: 0 0 30px rgba(255,45,85,0.7), 0 0 60px rgba(0,242,234,0.4); }
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-text span:first-child { color: var(--pink); }
  .logo-text span:last-child { color: var(--cyan); }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Form */
  .form-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--cyan);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 700;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--white);
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    direction: rtl;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(255,45,85,0.1);
  }

  .form-textarea { resize: none; height: 90px; }

  .form-select option { background: #1a1a1a; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 14px;
  }

  .form-group { margin-top: 14px; }
  .form-group:first-child { margin-top: 0; }

  /* Features grid */
  .features-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .feature-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }

  .feature-toggle.active {
    border-color: var(--pink);
    background: rgba(255,45,85,0.08);
    box-shadow: var(--card-glow-pink);
  }

  .feature-toggle.active .feat-icon { color: var(--pink); }

  .feat-icon { font-size: 18px; transition: color 0.2s; }
  .feat-label { font-size: 12px; font-weight: 600; color: var(--white); }
  .feat-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

  /* Generate Button */
  .btn-generate {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--pink) 0%, #ff6b6b 50%, var(--cyan) 100%);
    background-size: 200% 200%;
    color: #000;
    font-family: 'Cairo', sans-serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    animation: gradient-shift 4s ease infinite;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .btn-generate:hover { transform: scale(1.02); }
  .btn-generate:active { transform: scale(0.98); opacity: 0.9; }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }

  .loading.show { display: block; }

  .loading-bars {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
  }

  .bar {
    width: 4px;
    height: 30px;
    border-radius: 4px;
    animation: bounce-bar 1.2s ease-in-out infinite;
  }

  .bar:nth-child(1) { background: var(--pink); animation-delay: 0s; }
  .bar:nth-child(2) { background: #ff6b6b; animation-delay: 0.1s; }
  .bar:nth-child(3) { background: var(--cyan); animation-delay: 0.2s; }
  .bar:nth-child(4) { background: #00c4bf; animation-delay: 0.3s; }
  .bar:nth-child(5) { background: var(--pink); animation-delay: 0.4s; }

  @keyframes bounce-bar {
    0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  .loading-text {
    color: var(--muted);
    font-size: 14px;
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

  /* Results */
  .results { display: none; }
  .results.show { display: block; }

  .result-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 14px;
    animation: slide-up 0.4s ease both;
  }

  @keyframes slide-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-section:nth-child(2) { animation-delay: 0.1s; }
  .result-section:nth-child(3) { animation-delay: 0.2s; }
  .result-section:nth-child(4) { animation-delay: 0.3s; }
  .result-section:nth-child(5) { animation-delay: 0.4s; }

  .result-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .result-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .icon-pink { background: rgba(255,45,85,0.15); }
  .icon-cyan { background: rgba(0,242,234,0.15); }
  .icon-purple { background: rgba(139,92,246,0.15); }
  .icon-orange { background: rgba(251,146,60,0.15); }

  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
  }

  .result-content { font-size: 14px; line-height: 1.8; color: #ccc; }

  .hook-item {
    background: var(--surface2);
    border-right: 3px solid var(--pink);
    border-radius: 0 10px 10px 0;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 14px;
    line-height: 1.6;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .hook-item:hover { background: rgba(255,45,85,0.08); }

  .copy-hint {
    font-size: 10px;
    color: var(--muted);
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
  }

  .hashtag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .hashtag {
    background: rgba(0,242,234,0.08);
    border: 1px solid rgba(0,242,234,0.2);
    color: var(--cyan);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Syne', sans-serif;
  }

  .hashtag:hover {
    background: rgba(0,242,234,0.2);
    border-color: var(--cyan);
  }

  .hashtag.tier-high {
    background: rgba(255,45,85,0.08);
    border-color: rgba(255,45,85,0.3);
    color: var(--pink);
    font-size: 14px;
  }

  .time-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .time-card {
    background: var(--surface2);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
  }

  .time-val {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--cyan);
  }

  .time-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .ideas-list { list-style: none; }

  .idea-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.6;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .idea-item:last-child { border-bottom: none; }

  .idea-num {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 800;
    color: var(--pink);
    min-width: 22px;
    margin-top: 2px;
  }

  .caption-box {
    background: var(--surface2);
    border-radius: 12px;
    padding: 14px;
    font-size: 14px;
    line-height: 1.8;
    color: #ddd;
    white-space: pre-wrap;
    cursor: pointer;
    transition: background 0.15s;
  }

  .caption-box:hover { background: rgba(255,45,85,0.05); }

  .copy-tip {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--cyan);
    color: #000;
    padding: 10px 24px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 700;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Score badge */
  .score-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,45,85,0.15);
    border: 1px solid rgba(255,45,85,0.3);
    color: var(--pink);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
    margin-right: auto;
  }

  .error-msg {
    background: rgba(255,45,85,0.1);
    border: 1px solid rgba(255,45,85,0.3);
    border-radius: 12px;
    padding: 14px;
    font-size: 14px;
    color: var(--pink);
    text-align: center;
    margin-bottom: 16px;
    display: none;
  }

  .error-msg.show { display: block; }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">
        <span>Algo</span><span>Hack</span>
      </div>
    </div>
    <div class="tagline">TikTok Algorithm Optimizer</div>
  </div>

  <!-- API Key -->
  <div class="form-section" style="border-color: rgba(0,242,234,0.3); margin-bottom:16px;">
    <div class="form-group" style="margin-top:0;">
      <label class="form-label">🔑 Anthropic API Key</label>
      <input type="password" class="form-input" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
      <div style="font-size:11px; color:#555; margin-top:6px;">احصل على مفتاح مجاني من <a href="https://console.anthropic.com" target="_blank" style="color:#00f2ea;">console.anthropic.com</a> — يُحفظ محلياً فقط</div>
    </div>
  </div>

  <!-- Form -->
  <div class="form-section">
    <div class="form-group">
      <label class="form-label">🎯 النيش (Niche)</label>
      <select class="form-select" id="niche">
        <option value="">اختر النيش...</option>
        <option value="إسلامي / قرآن">إسلامي / قرآن</option>
        <option value="كوميدي / ترفيه">كوميدي / ترفيه</option>
        <option value="تعليمي / معلومات">تعليمي / معلومات</option>
        <option value="لياقة / رياضة">لياقة / رياضة</option>
        <option value="طبخ / مأكولات">طبخ / مأكولات</option>
        <option value="تقنية / تك">تقنية / تك</option>
        <option value="سفر / مغامرات">سفر / مغامرات</option>
        <option value="موضة / ستايل">موضة / ستايل</option>
        <option value="أعمال / ريادة">أعمال / ريادة</option>
        <option value="علاقات / موتيفيشن">علاقات / موتيفيشن</option>
        <option value="ألعاب / Gaming">ألعاب / Gaming</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">📝 وصف الفيديو (اختياري)</label>
      <textarea class="form-textarea" id="description" placeholder="اوصف محتوى الفيديو اللي تبغى تنشره..."></textarea>
    </div>

    <div class="form-row">
      <div>
        <label class="form-label">🌍 الجمهور</label>
        <select class="form-select" id="audience">
          <option value="عربي">عربي</option>
          <option value="خليجي">خليجي</option>
          <option value="شباب 18-25">18-25 شباب</option>
          <option value="مسلمين">مسلمين</option>
          <option value="عالمي">عالمي</option>
        </select>
      </div>
      <div>
        <label class="form-label">⏱️ مدة الفيديو</label>
        <select class="form-select" id="duration">
          <option value="7-15 ثانية">7-15 ث</option>
          <option value="15-30 ثانية">15-30 ث</option>
          <option value="30-60 ثانية">30-60 ث</option>
          <option value="60-90 ثانية">60-90 ث</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Feature toggles -->
  <div class="features-grid">
    <div class="feature-toggle active" onclick="toggleFeature(this, 'hooks')">
      <span class="feat-icon">🎣</span>
      <div>
        <div class="feat-label">Hooks</div>
        <div class="feat-sub">أول 3 ثواني</div>
      </div>
    </div>
    <div class="feature-toggle active" onclick="toggleFeature(this, 'hashtags')">
      <span class="feat-icon">#️⃣</span>
      <div>
        <div class="feat-label">Hashtags</div>
        <div class="feat-sub">استراتيجية</div>
      </div>
    </div>
    <div class="feature-toggle active" onclick="toggleFeature(this, 'caption')">
      <span class="feat-icon">📝</span>
      <div>
        <div class="feat-label">Caption</div>
        <div class="feat-sub">يزيد التفاعل</div>
      </div>
    </div>
    <div class="feature-toggle active" onclick="toggleFeature(this, 'timing')">
      <span class="feat-icon">🕐</span>
      <div>
        <div class="feat-label">Timing</div>
        <div class="feat-sub">أفضل وقت</div>
      </div>
    </div>
    <div class="feature-toggle active" onclick="toggleFeature(this, 'ideas')">
      <span class="feat-icon">💡</span>
      <div>
        <div class="feat-label">Ideas</div>
        <div class="feat-sub">أفكار ترند</div>
      </div>
    </div>
    <div class="feature-toggle active" onclick="toggleFeature(this, 'strategy')">
      <span class="feat-icon">🧠</span>
      <div>
        <div class="feat-label">Strategy</div>
        <div class="feat-sub">تكتيكات</div>
      </div>
    </div>
  </div>

  <!-- Generate button -->
  <button class="btn-generate" onclick="generate()" id="genBtn">
    ⚡ اختراق الخوارزمية
  </button>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="loading-bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div class="loading-text">🔍 تحليل الخوارزمية...</div>
  </div>

  <!-- Results -->
  <div class="results" id="results"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast">✅ تم النسخ!</div>

<script>
const activeFeatures = new Set(['hooks','hashtags','caption','timing','ideas','strategy']);

function toggleFeature(el, feat) {
  if (activeFeatures.has(feat)) {
    activeFeatures.delete(feat);
    el.classList.remove('active');
  } else {
    activeFeatures.add(feat);
    el.classList.add('active');
  }
}

function showToast(msg = '✅ تم النسخ!') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast());
}

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const niche = document.getElementById('niche').value;
  const description = document.getElementById('description').value.trim();
  const audience = document.getElementById('audience').value;
  const duration = document.getElementById('duration').value;

  if (!apiKey || !apiKey.startsWith('sk-')) {
    document.getElementById('errorMsg').textContent = '⚠️ أدخل API Key صحيح (يبدأ بـ sk-ant-)';
    document.getElementById('errorMsg').classList.add('show');
    return;
  }

  if (!niche) {
    document.getElementById('errorMsg').textContent = '⚠️ اختر النيش أولاً';
    document.getElementById('errorMsg').classList.add('show');
    return;
  }

  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('genBtn').disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('results').classList.remove('show');
  document.getElementById('results').innerHTML = '';

  const featList = Array.from(activeFeatures).join(', ');

  const prompt = `أنت خبير خوارزميات TikTok. أعطني استراتيجية متكاملة لفيديو بالمعطيات التالية:
- النيش: ${niche}
- الجمهور: ${audience}
- مدة الفيديو: ${duration}
${description ? `- وصف الفيديو: ${description}` : ''}
- المطلوب: ${featList}

أعطني النتائج بـ JSON فقط بهذا الشكل (لا تضف أي نص خارج الـ JSON):
{
  "viralScore": "رقم من 1-100 لإمكانية انتشار هذا المحتوى",
  "hooks": [
    "hook 1 - جملة افتتاحية قوية تجذب في 3 ثواني",
    "hook 2",
    "hook 3",
    "hook 4"
  ],
  "hashtags": {
    "high": ["#هاشتاق_كبير1", "#هاشتاق_كبير2"],
    "medium": ["#هاشتاق_وسط1", "#هاشتاق_وسط2", "#هاشتاق_وسط3"],
    "niche": ["#هاشتاق_متخصص1", "#هاشتاق_متخصص2", "#هاشتاق_متخصص3", "#هاشتاق_متخصص4"]
  },
  "caption": "كابشن كامل وجذاب مع سؤال يشجع على التعليق",
  "bestTimes": [
    {"time": "8:00 م", "reason": "سبب"},
    {"time": "12:00 م", "reason": "سبب"},
    {"time": "10:00 م", "reason": "سبب"}
  ],
  "contentIdeas": [
    "فكرة فيديو 1",
    "فكرة فيديو 2",
    "فكرة فيديو 3",
    "فكرة فيديو 4",
    "فكرة فيديو 5"
  ],
  "strategy": "3-4 تكتيكات مهمة لاختراق الخوارزمية في هذا النيش"
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content.map(i => i.text || '').join('');
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Invalid response');
    const result = JSON.parse(jsonMatch[0]);

    renderResults(result);

  } catch (e) {
    document.getElementById('errorMsg').textContent = '❌ حدث خطأ، جرب مرة ثانية';
    document.getElementById('errorMsg').classList.add('show');
  } finally {
    document.getElementById('genBtn').disabled = false;
    document.getElementById('loading').classList.remove('show');
  }
}

// Restore saved key
window.addEventListener('load', () => {
  try {
    const saved = localStorage.getItem('ant_key');
    if (saved) document.getElementById('apiKey').value = saved;
  } catch(e) {}
});

function renderResults(r) {
  const container = document.getElementById('results');
  container.innerHTML = '';

  let html = '';

  // Viral score
  const score = parseInt(r.viralScore) || 75;
  const scoreColor = score >= 80 ? '#00f2ea' : score >= 60 ? '#ff2d55' : '#f59e0b';
  html += `
    <div class="result-section" style="border-color: ${scoreColor}40; box-shadow: 0 0 20px ${scoreColor}15;">
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="font-size:36px; font-family:'Syne',sans-serif; font-weight:800; color:${scoreColor}">${score}</div>
        <div>
          <div style="font-size:13px; color:#888; margin-bottom:2px;">Viral Score</div>
          <div style="height:6px; background:#1a1a1a; border-radius:6px; width:160px; overflow:hidden;">
            <div style="height:100%; width:${score}%; background:linear-gradient(90deg, ${scoreColor}, ${scoreColor}aa); border-radius:6px; transition:width 1s ease;"></div>
          </div>
        </div>
        <div style="margin-right:auto; font-size:22px;">${score >= 80 ? '🔥' : score >= 60 ? '⚡' : '💡'}</div>
      </div>
    </div>`;

  // Hooks
  if (activeFeatures.has('hooks') && r.hooks) {
    html += `<div class="result-section">
      <div class="result-header">
        <div class="result-icon icon-pink">🎣</div>
        <div class="result-title">Viral Hooks — أول 3 ثواني</div>
      </div>`;
    r.hooks.forEach(h => {
      html += `<div class="hook-item" onclick="copyText(this.dataset.text)" data-text="${h.replace(/"/g,'&quot;')}">
        ${h}
        <span class="copy-hint">نسخ</span>
      </div>`;
    });
    html += `<div class="copy-tip">اضغط على أي hook لنسخه</div></div>`;
  }

  // Caption
  if (activeFeatures.has('caption') && r.caption) {
    html += `<div class="result-section">
      <div class="result-header">
        <div class="result-icon icon-orange">📝</div>
        <div class="result-title">Caption محسّن</div>
      </div>
      <div class="caption-box" onclick="copyText(this.dataset.text)" data-text="${r.caption.replace(/"/g,'&quot;')}">${r.caption}</div>
      <div class="copy-tip">اضغط لنسخ الكابشن كاملاً</div>
    </div>`;
  }

  // Hashtags
  if (activeFeatures.has('hashtags') && r.hashtags) {
    html += `<div class="result-section">
      <div class="result-header">
        <div class="result-icon icon-cyan">#️⃣</div>
        <div class="result-title">Hashtag Strategy</div>
      </div>
      <div style="margin-bottom:8px; font-size:11px; color:#555; letter-spacing:1px;">🔴 كبير</div>
      <div class="hashtag-cloud" style="margin-bottom:14px;">`;
    (r.hashtags.high || []).forEach(h => html += `<span class="hashtag tier-high" onclick="copyText('${h}')">${h}</span>`);
    html += `</div>
      <div style="margin-bottom:8px; font-size:11px; color:#555; letter-spacing:1px;">🟡 متوسط + 🟢 نيش</div>
      <div class="hashtag-cloud">`;
    [...(r.hashtags.medium || []), ...(r.hashtags.niche || [])].forEach(h => html += `<span class="hashtag" onclick="copyText('${h}')">${h}</span>`);
    html += `</div>
      <div class="copy-tip">اضغط على أي هاشتاق لنسخه</div>
    </div>`;
  }

  // Best times
  if (activeFeatures.has('timing') && r.bestTimes) {
    html += `<div class="result-section">
      <div class="result-header">
        <div class="result-icon icon-cyan">🕐</div>
        <div class="result-title">أفضل أوقات النشر</div>
      </div>
      <div class="time-grid">`;
    r.bestTimes.forEach(t => {
      html += `<div class="time-card">
        <div class="time-val">${t.time}</div>
        <div class="time-label">${t.reason}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Content Ideas
  if (activeFeatures.has('ideas') && r.contentIdeas) {
    html += `<div class="result-section">
      <div class="result-header">
        <div class="result-icon icon-purple">💡</div>
        <div class="result-title">أفكار فيديوهات ترندينغ</div>
      </div>
      <ul class="ideas-list">`;
    r.contentIdeas.forEach((idea, i) => {
      html += `<li class="idea-item">
        <span class="idea-num">0${i+1}</span>
        <span>${idea}</span>
      </li>`;
    });
    html += `</ul></div>`;
  }

  // Strategy
  if (activeFeatures.has('strategy') && r.strategy) {
    html += `<div class="result-section" style="border-color: rgba(255,45,85,0.3);">
      <div class="result-header">
        <div class="result-icon icon-pink">🧠</div>
        <div class="result-title">تكتيكات اختراق الخوارزمية</div>
      </div>
      <div class="result-content">${r.strategy}</div>
    </div>`;
  }

  container.innerHTML = html;
  container.classList.add('show');
  container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
